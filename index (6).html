.ld{width:11px;height:11px;border-radius:3px;flex-shrink:0;}

.vrow{display:flex;align-items:center;gap:0;margin-bottom:2px;width:100%;}

.sa{background:#E6F1FB;border-color:#85B7EB;color:#185FA5;}
.sb{background:#E1F5EE;border-color:#5DCAA5;color:#0F6E56;}
.sc{background:#FAEEDA;border-color:#EF9F27;color:#854F0B;}
.sa.filled{background:#378ADD;border-color:#185FA5;color:#fff;cursor:grab;}
.sb.filled{background:#1D9E75;border-color:#0F6E56;color:#fff;cursor:grab;}
.sc.filled{background:#BA7517;border-color:#854F0B;color:#fff;cursor:grab;}

.seat.drag-over{transform:scale(1.12);box-shadow:0 0 0 2px #F59E0B;z-index:5;}
.seat.drag-src{opacity:.35;}
.seat.ceremony{background:#E11D48!important;border-color:#9F1239!important;color:#fff!important;}
.seat.photo{background:#F59E0B!important;border-color:#B45309!important;color:#fff!important;}
.seat.occupied{background:#6366F1!important;border-color:#4338CA!important;color:#fff!important;}
.seat.found{background:#FEF08A!important;border-color:#CA8A04!important;color:#713F12!important;box-shadow:0 0 0 2px #FDE047;animation:findpulse 1s ease-in-out 2;}

.modal-code{font-size:16px;font-weight:600;color:#111;margin-bottom:4px;}
.modal-name{font-size:12px;color:#6B7280;margin-bottom:14px;background:#F9FAFB;padding:8px 10px;border-radius:8px;min-height:32px;}

const isRes=n=>n&&(n.startsWith('保留席')||n.startsWith('GROUP')||/^(媒體|外媒|國際貿易署)/.test(n));
const ZS_MAP={'A':0,'B':1,'C':2};
function codeToSid(c){const z=ZS_MAP[c[0]];const p=c.slice(1).split('-');return(parseInt(p[0])-1)+'-'+z+'-'+parseInt(p[1]);}

const seatMap={},asgn={},tags={},occupied={};
const guests=[];
let dragGuest=null,dragFrom=null,masterLoaded=false,saveTimer=null;
let modalId=null,modalR=null,modalZ=null,modalS=null;
const dtt=document.getElementById('dtt');
const sid=(r,z,s)=>r+'-'+z+'-'+s;
const code=(r,z,s)=>ZK[z]+(r+1)+'-'+s;

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'),lbl=document.getElementById('sync-lbl');
  if(s==='ok'){dot.className='sync-dot';lbl.textContent='已同步';}
  else if(s==='saving'){dot.className='sync-dot saving';lbl.textContent='儲存中...';}
  else{dot.className='sync-dot off';lbl.textContent='連線失敗';}
}

onValue(masterRef,snap=>{
  const d=snap.val()||{};
  Object.keys(seatMap).forEach(k=>delete seatMap[k]);
  if(Object.keys(d).length===0){
    // seats_master2026 是空的，名單從 assignments2026 動態建立，避免名稱不符
    guests.length=0;
  }else{
    Object.entries(d).forEach(([c,n])=>seatMap[c]=n);
    rebuildGuests();
  }
  masterLoaded=true;setSyncStatus('ok');refreshAll();
},()=>{
  Object.entries(FALLBACK).forEach(([c,n])=>seatMap[c]=n);
  guests.length=0;guests.push(...FALLBACK_GUESTS);
  masterLoaded=true;setSyncStatus('error');refreshAll();
});

onValue(assignRef,snap=>{
  const d=snap.val()||{};
  Object.keys(asgn).forEach(k=>delete asgn[k]);
  Object.entries(d).forEach(([c,n])=>{const s=codeToSid(c);if(s)asgn[s]=n;});
  // 確保 asgn 裡的人也在 guests（避免遺漏）
  Object.values(asgn).forEach(n=>{if(n&&!isRes(n)&&!guests.includes(n))guests.push(n);});
  guests.sort();
  if(masterLoaded)refreshAll();
});

function rebuildGuests(){
  guests.length=0;
  guests.push(...[...new Set(Object.values(seatMap).filter(n=>!isRes(n)))].sort());
}

onValue(tagsRef,snap=>{
  const d=snap.val()||{};
  Object.keys(tags).forEach(k=>delete tags[k]);
  Object.entries(d).forEach(([c,t])=>{const s=codeToSid(c);if(s)tags[s]=t;});
  if(masterLoaded)refreshAll();
});

onValue(occRef,snap=>{
  const d=snap.val()||{};
  Object.keys(occupied).forEach(k=>delete occupied[k]);
  Object.entries(d).forEach(([c,v])=>{if(v==='佔用'){const s=codeToSid(c);if(s)occupied[s]=true;}});
  if(masterLoaded)refreshAll();
});

async function saveAll(){
  setSyncStatus('saving');
  try{
    const ao={};Object.entries(asgn).forEach(([id,n])=>{const p=id.split('-');ao[code(+p[0],+p[1],+p[2])]=n;});
    await set(assignRef,Object.keys(ao).length?ao:null);
    const to={};Object.entries(tags).forEach(([id,t])=>{const p=id.split('-');to[code(+p[0],+p[1],+p[2])]=t;});
    await set(tagsRef,Object.keys(to).length?to:null);
    const oo={};Object.keys(occupied).forEach(id=>{const p=id.split('-');oo[code(+p[0],+p[1],+p[2])]='佔用';});
    await set(occRef,Object.keys(oo).length?oo:null);
    setSyncStatus('ok');
  }catch(e){setSyncStatus('error');toast('儲存失敗','ter');}
}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveAll,800);}

// ── 建立座位圖（自適應寬度）────────────────────────────
function buildVenue(){
  const wrap=document.getElementById('venue-wrap');
  const availW=wrap.clientWidth-32; // padding
  const rowLabelW=24;
  const gapW=12;
  const totalCols=ZS[0]+ZS[1]+ZS[2]; // 6+9+6=21
  const seatW=Math.floor((availW-rowLabelW-gapW*2)/totalCols);
  const seatGap=0;

  // Zone header row
  const hdr=document.getElementById('zone-hdr');
  hdr.innerHTML='';
  hdr.style.gap='0';
  const spacer=document.createElement('div');spacer.style.cssText=`width:${rowLabelW}px;flex-shrink:0;`;hdr.appendChild(spacer);
  [['A 區（左）','zh-a',ZS[0]],['B 區（中）','zh-b',ZS[1]],['C 區（右）','zh-c',ZS[2]]].forEach(([lbl,cls,sz],zi)=>{
    if(zi>0){const g=document.createElement('div');g.style.cssText=`width:${gapW}px;flex-shrink:0;`;hdr.appendChild(g);}
    const d=document.createElement('div');d.className=`zh ${cls}`;d.style.cssText=`width:${seatW*sz}px;flex-shrink:0;`;d.textContent=lbl;hdr.appendChild(d);
  });

  const c=document.getElementById('vr');c.innerHTML='';
  for(let r=0;r<ROWS;r++){
    const row=document.createElement('div');row.className='vrow';
    const lbl=document.createElement('div');lbl.className='rl';lbl.style.width=rowLabelW+'px';lbl.textContent=r+1;row.appendChild(lbl);
    for(let z=0;z<3;z++){
      if(z>0){const a=document.createElement('div');a.className='seat-gap';a.style.width=gapW+'px';row.appendChild(a);}
      const zone=document.createElement('div');zone.className='vzone';
      for(let s=1;s<=ZS[z];s++){
        const id=sid(r,z,s),el=document.createElement('div');
        el.className='seat s'+ZK[z].toLowerCase();
        el.style.width=seatW+'px';
        el.id='s'+id;el.dataset.id=id;el.dataset.r=r;el.dataset.z=z;el.dataset.s=s;
        el.title=code(r,z,s);
        el.onclick=()=>openModal(id,r,z,s);
        el.draggable=false;
        el.addEventListener('dragstart',onDS);el.addEventListener('dragend',onDE);
        el.addEventListener('dragover',onDO);el.addEventListener('dragleave',onDL);
        el.addEventListener('drop',onDP);
        zone.appendChild(el);
      }
      row.appendChild(zone);
    }
    c.appendChild(row);
  }
}

function onDS(e){const id=this.dataset.id;if(!asgn[id]&&!occupied[id]){e.preventDefault();return;}
  dragGuest=asgn[id]||null;dragFrom=id;this.classList.add('drag-src');
  e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',dragGuest||'');showTip(e,dragGuest||'佔用');}
function onDE(){this.classList.remove('drag-src');dragGuest=null;dragFrom=null;hideTip();clearDO();}
function onDO(e){if(!dragFrom)return;e.preventDefault();e.dataTransfer.dropEffect='move';clearDO();this.classList.add('drag-over');moveTip(e);}
function onDL(){clearDO();}
function onDP(e){
  e.preventDefault();const toId=this.dataset.id;if(!dragFrom){clearDO();return;}
  const toG=asgn[toId]||null;
  if(dragGuest){
    if(toG){asgn[dragFrom]=toG;asgn[toId]=dragGuest;const tf=tags[dragFrom];if(tags[toId])tags[dragFrom]=tags[toId];else delete tags[dragFrom];if(tf)tags[toId]=tf;else delete tags[toId];toast('↔ 互換完成','tin');}
    else{delete asgn[dragFrom];delete tags[dragFrom];asgn[toId]=dragGuest;toast('✓ 移動完成','tok');}
  }
  dragGuest=null;dragFrom=null;hideTip();clearDO();refreshAll();scheduleSave();
}

function chipDrag(chip,g){
  chip.draggable=true;
  chip.addEventListener('dragstart',e=>{dragGuest=g;dragFrom=null;chip.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',g);showTip(e,g);});
  chip.addEventListener('dragend',()=>{chip.classList.remove('dragging');dragGuest=null;dragFrom=null;hideTip();clearDO();});
}

function openModal(id,r,z,s){
  modalId=id;modalR=r;modalZ=z;modalS=s;
  const g=asgn[id]||'',occ=occupied[id],tag=tags[id]||'';
  document.getElementById('m-code').innerHTML=`<span class="bz bz${ZK[z].toLowerCase()}">${ZK[z]} 區</span>${code(r,z,s)}`;
  document.getElementById('m-name').textContent=occ?'（佔用中）':g||'（空位）';
  const avail=guests.filter(gg=>!Object.entries(asgn).some(([sid2,ag])=>sid2!==id&&ag===gg));
  const sel=document.getElementById('m-select');
  sel.innerHTML='<option value="">— 請選擇賓客 —</option>'+(g?`<option value="${g}" selected>${g}</option>`:'')+avail.filter(gg=>gg!==g).map(gg=>`<option value="${gg}">${gg}</option>`).join('');
  document.getElementById('m-assign-sec').style.display=occ?'none':'';
  document.getElementById('m-clear-btn').style.display=g?'':'none';
  const showTag=!occ;
  document.getElementById('m-tag-sec').style.display=showTag?'':'none';
  if(showTag){
    document.getElementById('btn-ceremony').style.display=g?'':'none';
    document.getElementById('btn-photo').style.display=g?'':'none';
    document.getElementById('btn-occ').style.display='';
    document.getElementById('btn-ceremony').classList.toggle('active',tag==='ceremony');
    document.getElementById('btn-photo').classList.toggle('active',tag==='photo');
    document.getElementById('btn-occ').classList.toggle('active',false);
  }
  if(occ){
    document.getElementById('m-tag-sec').style.display='';
    document.getElementById('btn-ceremony').style.display='none';
    document.getElementById('btn-photo').style.display='none';
    document.getElementById('btn-occ').style.display='';
    document.getElementById('btn-occ').classList.add('active');
  }
  document.getElementById('modal-bg').classList.add('show');
}

window.closeBg=function(e){if(e.target===document.getElementById('modal-bg'))closeModal();};
window.closeModal=function(){document.getElementById('modal-bg').classList.remove('show');modalId=null;};
window.doAssignModal=function(g){
  if(!modalId)return;
  if(g===''){delete asgn[modalId];delete tags[modalId];}else{asgn[modalId]=g;delete occupied[modalId];}
  refreshAll();scheduleSave();openModal(modalId,modalR,modalZ,modalS);
};
window.clearSeat=function(){
  if(!modalId)return;
  delete asgn[modalId];delete tags[modalId];
  refreshAll();scheduleSave();openModal(modalId,modalR,modalZ,modalS);
};
window.toggleTag=function(t){
  if(!modalId)return;
  if(tags[modalId]===t)delete tags[modalId];else tags[modalId]=t;
  refreshAll();scheduleSave();
  document.getElementById('btn-ceremony').classList.toggle('active',tags[modalId]==='ceremony');
  document.getElementById('btn-photo').classList.toggle('active',tags[modalId]==='photo');
  toast(tags[modalId]?`已標記：${tags[modalId]==='ceremony'?'揭幕':'合影'}`:'已清除標記','tok');
};
window.toggleOccupied=function(){
  if(!modalId)return;
  if(occupied[modalId]){delete occupied[modalId];toast('已取消佔用','tin');}
  else{occupied[modalId]=true;delete asgn[modalId];delete tags[modalId];toast('🪑 已標記佔用','tok');}
  refreshAll();scheduleSave();openModal(modalId,modalR,modalZ,modalS);
};

function refreshAll(){renderSeats();updateStats();renderChips();}
function renderSeats(){
  for(let r=0;r<ROWS;r++)for(let z=0;z<3;z++)for(let s=1;s<=ZS[z];s++){
    const id=sid(r,z,s),el=document.getElementById('s'+id);if(!el)continue;
    const g=asgn[id],occ=occupied[id],tag=tags[id];
    let cls='seat s'+ZK[z].toLowerCase();
    if(occ)cls+=' occupied';else if(tag==='ceremony')cls+=' ceremony';else if(tag==='photo')cls+=' photo';else if(g)cls+=' filled';
    el.className=cls;el.draggable=!!(g||occ);
    el.textContent=occ?'占':g?(g.trim()[0]||'?'):'';
    el.title=code(r,z,s)+(occ?' — 佔用':g?' — '+g:'');
  }
}
function updateStats(){
  const n=Object.keys(asgn).length,oc=Object.keys(occupied).length,gc=guests.length;
  document.getElementById('sa').textContent=n+oc;
  document.getElementById('se').textContent=210-n-oc;
  document.getElementById('sg').textContent=gc;
  document.getElementById('pf').style.width=(gc?n/gc*100:0)+'%';
  document.getElementById('ptxt').textContent=n+' / '+gc+' 位賓客已分配';
}
window.renderChips=function renderChips(){
  const aset=new Set(Object.values(asgn));
  const kw=(document.getElementById('gs')||{value:''}).value.trim().toLowerCase();

  // ── 清除舊的 highlight ──────────────────────────────────
  document.querySelectorAll('.seat.found').forEach(el=>el.classList.remove('found'));

  const box=document.getElementById('chips');box.innerHTML='';

  if(kw){
    // ── 搜尋模式：在座位圖上 highlight 符合的座位 ──────────
    let foundSeats=[];
    Object.entries(asgn).forEach(([id,name])=>{
      if(name&&name.toLowerCase().includes(kw)){
        const el=document.getElementById('s'+id);
        if(el){el.classList.add('found');foundSeats.push({id,name});}
      }
    });
    // 也搜尋未分配的賓客
    const unassignedMatches=guests.filter(g=>!aset.has(g)&&g.toLowerCase().includes(kw));

    document.getElementById('uc-count').textContent=
      (foundSeats.length+unassignedMatches.length)+' 筆結果';

    if(!foundSeats.length&&!unassignedMatches.length){
      box.innerHTML='<div style="font-size:11px;color:#9CA3AF;padding:4px;">找不到符合的賓客</div>';
      return;
    }
    // 顯示已分配的搜尋結果（含座位編號）
    foundSeats.forEach(({id,name})=>{
      const p=id.split('-');const seatCode=code(+p[0],+p[1],+p[2]);
      const chip=document.createElement('span');
      chip.className='chip';
      chip.style.cssText='background:#FEFCE8;border-color:#CA8A04;color:#713F12;';
      chip.textContent=name;
      const badge=document.createElement('span');
      badge.style.cssText='font-size:9px;background:#FDE047;color:#713F12;padding:1px 5px;border-radius:4px;margin-left:5px;font-weight:700;';
      badge.textContent=seatCode;
      chip.appendChild(badge);
      // 點擊後捲動到座位
      chip.onclick=()=>{
        const el=document.getElementById('s'+id);
        if(el){el.scrollIntoView({behavior:'smooth',block:'center'});
          el.style.outline='3px solid #CA8A04';setTimeout(()=>el.style.outline='',1500);}
      };
      box.appendChild(chip);
    });
    // 顯示未分配的搜尋結果
    unassignedMatches.forEach(g=>{
      const chip=document.createElement('span');chip.className='chip';chip.textContent=g;
      chip.onclick=()=>{
        if(modalId&&!occupied[modalId]){asgn[modalId]=g;delete occupied[modalId];refreshAll();scheduleSave();openModal(modalId,modalR,modalZ,modalS);}
        else toast('請先點選一個座位','ter');
      };
      const xBtn=document.createElement('button');xBtn.className='chip-x';xBtn.textContent='✕';xBtn.title='從名單移除';
      xBtn.onclick=e=>{e.stopPropagation();removeGuest(g);};
      chip.appendChild(xBtn);chipDrag(chip,g);box.appendChild(chip);
    });
    return;
  }

  // ── 一般模式：顯示未分配名單 ───────────────────────────
  let list=guests.filter(g=>!aset.has(g));
  document.getElementById('uc-count').textContent=list.length+' 未分配';
  if(!list.length){box.innerHTML='<div style="font-size:11px;color:#9CA3AF;padding:4px;">🎉 所有賓客皆已分配！</div>';return;}
  list.forEach(g=>{
    const chip=document.createElement('span');chip.className='chip';chip.textContent=g;
    chip.onclick=()=>{
      if(modalId&&!occupied[modalId]){asgn[modalId]=g;delete occupied[modalId];refreshAll();scheduleSave();openModal(modalId,modalR,modalZ,modalS);}
      else toast('請先點選一個座位','ter');
    };
    const xBtn=document.createElement('button');xBtn.className='chip-x';xBtn.textContent='✕';xBtn.title='從名單移除';
    xBtn.onclick=e=>{e.stopPropagation();removeGuest(g);};
    chip.appendChild(xBtn);chipDrag(chip,g);box.appendChild(chip);
  });
}
function removeGuest(g){
  const idx=guests.indexOf(g);if(idx===-1)return;guests.splice(idx,1);
  Object.entries(asgn).forEach(([id,n])=>{if(n===g){delete asgn[id];delete tags[id];}});
  refreshAll();scheduleSave();toast('已移除：'+g.substring(0,15)+'...','tin');
}
window.addGuest=function(){
  const inp=document.getElementById('gi');
  if(!inp){toast('找不到輸入欄位','ter');return;}
  const n=inp.value.trim();
  if(!n){toast('請輸入賓客名稱','ter');return;}
  if(guests.includes(n)){toast('此賓客已在名單中','ter');return;}
  guests.push(n);
  guests.sort();
  inp.value='';
  inp.focus();
  refreshAll();
  toast('已新增：'+n.substring(0,20)+(n.length>20?'...':''),'tok');
};
window.doReset=function(){
  if(!confirm('確定要清除所有分配、標記和佔用嗎？'))return;
  Object.keys(asgn).forEach(k=>delete asgn[k]);
  Object.keys(tags).forEach(k=>delete tags[k]);
  Object.keys(occupied).forEach(k=>delete occupied[k]);
  refreshAll();scheduleSave();
};

// ── 匯出分配 XLSX ─────────────────────────────────────
window.doExport=function(){
  if(typeof XLSX==='undefined'){toast('載入中','ter');return;}
  const btn=document.getElementById('exbtn');btn.textContent='⏳...';btn.disabled=true;
  try{
    const wb=XLSX.utils.book_new();
    const r1=[['座位編號','組別','排別','座號','賓客姓名','狀態','活動標記']];
    for(let r=0;r<ROWS;r++)for(let z=0;z<3;z++)for(let s=1;s<=ZS[z];s++){
      const id=sid(r,z,s),g=asgn[id]||'',occ=occupied[id],tag=tags[id]||'';
      r1.push([code(r,z,s),ZN[z],'第'+(r+1)+'排','第'+s+'號',occ?'（佔用）':g,occ?'佔用':g?'已分配':'空位',tag==='ceremony'?'揭幕':tag==='photo'?'合影':'']);
    }
    const ws=XLSX.utils.aoa_to_sheet(r1);ws['!cols']=[{wch:10},{wch:12},{wch:8},{wch:8},{wch:42},{wch:8},{wch:8}];
    XLSX.utils.book_append_sheet(wb,ws,'座位分配總表');
    const cR=[['座位編號','賓客姓名']];
    Object.entries(tags).filter(([,t])=>t==='ceremony').forEach(([id])=>{const p=id.split('-');cR.push([code(+p[0],+p[1],+p[2]),asgn[id]||'']);});
    const wc=XLSX.utils.aoa_to_sheet(cR);wc['!cols']=[{wch:10},{wch:42}];XLSX.utils.book_append_sheet(wb,wc,'揭幕名單');
    const pR=[['座位編號','賓客姓名']];
    Object.entries(tags).filter(([,t])=>t==='photo').forEach(([id])=>{const p=id.split('-');pR.push([code(+p[0],+p[1],+p[2]),asgn[id]||'']);});
    const wp=XLSX.utils.aoa_to_sheet(pR);wp['!cols']=[{wch:10},{wch:42}];XLSX.utils.book_append_sheet(wb,wp,'合影名單');
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([out],{type:'application/octet-stream'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='座位分配表.xlsx';
    document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
    toast('✓ 已匯出分配表','tok');
  }catch(e){toast('匯出失敗','ter');}
  finally{setTimeout(()=>{btn.textContent='⬇ 匯出 XLSX';btn.disabled=false;},1200);}
};

// ── 匯出視覺化席次圖 XLSX ─────────────────────────────
window.doExportMap=function(){
  if(typeof XLSX==='undefined'){toast('載入中','ter');return;}
  const btn=document.getElementById('mapbtn');btn.textContent='⏳...';btn.disabled=true;
  try{
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet([]);
    ws['!merges']=[];
    const thin={style:'thin',color:{rgb:'CCCCCC'}};
    const bdr={top:thin,bottom:thin,left:thin,right:thin};
    const fill=h=>({patternType:'solid',fgColor:{rgb:h}});
    const ca=(wrap=true)=>({horizontal:'center',vertical:'center',wrapText:wrap});
    const font=(sz,bold,color)=>({sz,bold,color:{rgb:color||'000000'},name:'Arial'});
    function mc(r1,c1,r2,c2){ws['!merges'].push({s:{r:r1,c:c1},e:{r:r2,c:c2}});}
    function sc(r,c,v,style){
      const addr=XLSX.utils.encode_cell({r,c});
      ws[addr]={v,t:typeof v==='number'?'n':'s',s:style};
      if(!ws['!ref'])ws['!ref']=addr;
      else{const rng=XLSX.utils.decode_range(ws['!ref']);const cr=XLSX.utils.decode_cell(addr);
        rng.s.r=Math.min(rng.s.r,cr.r);rng.s.c=Math.min(rng.s.c,cr.c);
        rng.e.r=Math.max(rng.e.r,cr.r);rng.e.c=Math.max(rng.e.c,cr.c);
        ws['!ref']=XLSX.utils.encode_range(rng);}
    }
    const COL_L=0,COL_A=[1,2,3,4,5,6],COL_G1=7,COL_B=[8,9,10,11,12,13,14,15,16],COL_G2=17,COL_C=[18,19,20,21,22,23],COL_R=24;
    const gl=c=>XLSX.utils.get_column_letter?XLSX.utils.get_column_letter(c+1):String.fromCharCode(65+c);
    ws['!cols']=[{wch:3}];
    COL_A.forEach(()=>ws['!cols'].push({wch:18}));ws['!cols'].push({wch:2});
    COL_B.forEach(()=>ws['!cols'].push({wch:18}));ws['!cols'].push({wch:2});
    COL_C.forEach(()=>ws['!cols'].push({wch:18}));ws['!cols'].push({wch:3});

    // Row 1: Title
    ws['!rows']=[{hpx:28}];mc(0,0,0,24);
    sc(0,0,'2026 COMPUTEX CEREMONY 席次圖',{font:font(14,true,'1F3864'),fill:fill('F2F2F2'),alignment:ca()});
    // Row 2: Stage
    ws['!rows'].push({hpx:20});mc(1,1,1,23);
    sc(1,1,'舞　台',{font:font(11,true,'FFFFFF'),fill:fill('4472C4'),alignment:ca()});
    // Row 3: Zone headers
    ws['!rows'].push({hpx:16});
    mc(2,COL_A[0],2,COL_A[5]);sc(2,COL_A[0],'A 區（左）',{font:font(10,true,'1F3864'),fill:fill('BDD7EE'),alignment:ca()});
    mc(2,COL_B[0],2,COL_B[8]);sc(2,COL_B[0],'B 區（中）',{font:font(10,true,'375623'),fill:fill('C6EFCE'),alignment:ca()});
    mc(2,COL_C[0],2,COL_C[5]);sc(2,COL_C[0],'C 區（右）',{font:font(10,true,'7F6000'),fill:fill('FFE699'),alignment:ca()});
    // Row 4: Seat numbers
    ws['!rows'].push({hpx:14});
    COL_A.forEach((c,i)=>sc(3,c,String(i+1),{font:font(8,true,'1F3864'),fill:fill('BDD7EE'),alignment:ca(),border:bdr}));
    COL_B.forEach((c,i)=>sc(3,c,String(i+1),{font:font(8,true,'375623'),fill:fill('C6EFCE'),alignment:ca(),border:bdr}));
    COL_C.forEach((c,i)=>sc(3,c,String(i+1),{font:font(8,true,'7F6000'),fill:fill('FFE699'),alignment:ca(),border:bdr}));

    const START=4;
    for(let r=0;r<ROWS;r++){
      const nr=START+r*2,cr=nr+1;
      ws['!rows'].push({hpx:42});ws['!rows'].push({hpx:12});
      mc(nr,COL_L,cr,COL_L);sc(nr,COL_L,String(r+1),{font:font(9,true,'595959'),fill:fill('F2F2F2'),alignment:ca(),border:bdr});
      mc(nr,COL_R,cr,COL_R);sc(nr,COL_R,String(r+1),{font:font(9,true,'595959'),fill:fill('F2F2F2'),alignment:ca(),border:bdr});
      const zoneData=[
        [COL_A,'A','DEEAF1','BDD7EE'],
        [COL_B,'B','E2EFDA','C6EFCE'],
        [COL_C,'C','FFF2CC','FFE699'],
      ];
      zoneData.forEach(([cols,zk,nf,cf])=>{
        cols.forEach((col,si)=>{
          const sCode=ZK[['A','B','C'].indexOf(zk)]+(r+1)+'-'+(si+1);
          const id=codeToSid(sCode);
          const g=id?asgn[id]||'':'';
          const occ=id&&occupied[id];
          const tag=id&&tags[id];
          const empty=!g&&!occ;
          const res=g&&isRes(g);
          let nameFill=empty?'FFFFFF':res?'F5F5F5':nf;
          let codeFill=empty?'FFFFFF':res?'F5F5F5':'F8F8F8';
          if(tag==='ceremony'){nameFill='FECDD3';codeFill='FFE4E6';}
          if(tag==='photo'){nameFill='FEF3C7';codeFill='FFFBEB';}
          if(occ){nameFill='E0E7FF';codeFill='EEF2FF';}
          const displayName=occ?'（佔用）':g||'';
          sc(nr,col,displayName,{font:font(8,false,empty||res?'AAAAAA':'000000'),fill:fill(nameFill),alignment:ca(),border:bdr});
          sc(cr,col,sCode,{font:font(7,!empty,'AAAAAA'),fill:fill(codeFill),alignment:ca(),border:bdr});
        });
      });
      // gap cols
      [COL_G1,COL_G2].forEach(gc=>{[nr,cr].forEach(row=>sc(row,gc,'',{fill:fill('FFFFFF')}));});
    }
    const last=START+ROWS*2;ws['!rows'].push({hpx:14});
    mc(last,0,last,24);
    const n=Object.keys(asgn).length;
    sc(last,0,`共 ${n} 席已分配`,{font:font(9,false,'595959'),fill:fill('F2F2F2'),alignment:{horizontal:'left',vertical:'center'}});
    ws['!pageSetup']={orientation:'landscape',fitToPage:true,fitToWidth:1};
    XLSX.utils.book_append_sheet(wb,ws,'席次圖');

    const out=XLSX.write(wb,{bookType:'xlsx',type:'array',cellStyles:true});
    const blob=new Blob([out],{type:'application/octet-stream'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='席次圖.xlsx';
    document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
    toast('🗺 席次圖已匯出','tok');
  }catch(e){console.error(e);toast('匯出失敗: '+e.message,'ter');}
  finally{setTimeout(()=>{btn.textContent='🗺 席次圖';btn.disabled=false;},1200);}
};

function clearDO(){document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));}
function showTip(e,t){dtt.textContent=t;dtt.style.display='block';moveTip(e);}
function moveTip(e){dtt.style.left=(e.clientX+14)+'px';dtt.style.top=(e.clientY-28)+'px';}
function hideTip(){dtt.style.display='none';}
document.addEventListener('dragover',e=>{if(dragGuest||dragFrom)moveTip(e);});
function toast(msg,cls){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+cls;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2800);}

buildVenue();
window.addEventListener('resize',buildVenue);
</script>
